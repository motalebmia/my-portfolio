<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts-container"></div>

<nav>
  <h2>My Portfolio</h2>
  <button class="btn">Hire Me</button>
</nav>

<section>
  <h1>Hi, I'm Your Name</h1>
  <p id="typing"></p>
</section>

<section>
  <div class="card">
    <h2>About Me</h2>
    <p>I design high-end digital experiences and websites.</p>
  </div>
</section>

<section>
  <div class="card">
    <h2>Skills</h2>
    <div class="circle" data="85">Editing</div>
    <div class="circle" data="75">Marketing</div>
  </div>
</section>

<section>
  <div class="card">
    <h2>Contact</h2>
    <input placeholder="Your Name">
    <input placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
