<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(270deg, #ff6a00, #ee0979, #00c6ff);
      background-size: 600% 600%;
      animation: gradientMove 12s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      margin-top: 80px;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    img {
      width: 150px;
      border-radius: 50%;
      border: 4px solid white;
      margin-bottom: 20px;
      transition: 0.4s;
    }

    img:hover {
      transform: scale(1.1) rotate(5deg);
    }

    h1 {
      font-size: 45px;
      margin: 10px;
    }

    .typing {
      font-size: 22px;
      color: #ffe600;
      height: 30px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ee0979;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: black;
      color: white;
    }

    .clicked {
      animation: pulse 0.5s;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .socials {
      margin-top: 30px;
    }

    .socials a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      transition: 0.3s;
    }

    .socials a:hover {
      color: yellow;
    }

  </style>
</head>

<body>

  <div class="container">
    <img src="https://via.placeholder.com/150" alt="profile">

    <h1>Hi, I'm Your Name</h1>
    <div class="typing" id="typing"></div>

    <button onclick="animateButton(this)">Click Me 🚀</button>

    <div class="socials">
      <a href="#">Facebook</a>
      <a href="#">GitHub</a>
      <a href="#">LinkedIn</a>
    </div>
  </div>

  <script>
    // Typing Animation
    const text = ["Web Developer", "Creative Designer", "Learner 🚀"];
    let i = 0, j = 0, currentText = "", isDeleting = false;

    function type() {
      currentText = text[i];
      if (!isDeleting) {
        document.getElementById("typing").innerHTML = currentText.substring(0, j++);
        if (j > currentText.length) {
          isDeleting = true;
          setTimeout(type, 1000);
          return;
        }
      } else {
        document.getElementById("typing").innerHTML = currentText.substring(0, j--);
        if (j == 0) {
          isDeleting = false;
          i = (i + 1) % text.length;
        }
      }
      setTimeout(type, isDeleting ? 50 : 100);
    }
    type();

    // Button Animation
    function animateButton(btn) {
      btn.classList.add("clicked");
      setTimeout(() => {
        btn.classList.remove("clicked");
        alert("Welcome to my professional site 😎");
      }, 500);
    }
  </script>

</body>
</html>
