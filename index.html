<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio</title>

<style>

:root {
  --bg: #0f2027;
  --text: white;
  --card: rgba(255,255,255,0.1);
}

.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: rgba(0,0,0,0.1);
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.5s;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  padding: 15px;
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
}

/* BUTTON */
.toggle {
  cursor: pointer;
  padding: 8px 15px;
  border-radius: 20px;
  border: none;
}

/* SECTION */
section {
  padding: 80px 20px;
  text-align: center;
}

/* GLASS CARD */
.card {
  margin: 20px auto;
  padding: 20px;
  width: 80%;
  background: var(--card);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* SKILLS */
.bar {
  height: 10px;
  background: gray;
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0;
  background: lime;
}

/* ANIMATION */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width:600px){
  .card { width: 95%; }
}

</style>
</head>

<body>

<nav>
  <h3>My Portfolio</h3>
  <button class="toggle" onclick="toggleMode()">🌙</button>
</nav>

<section class="hidden">
  <h1>Hi, I'm Md Motaleb Mia</h1>
  <p>Creative Developer 🚀</p>
</section>

<section class="hidden">
  <div class="card">
    <h2>About Me</h2>
    <p>I am learning web development and building cool projects.</p>
  </div>
</section>

<section class="hidden">
  <div class="card">
    <h2>Skills</h2>

    <p>HTML</p>
    <div class="bar"><div class="fill" style="width:90%"></div></div>

    <p>CSS</p>
    <div class="bar"><div class="fill" style="width:80%"></div></div>

    <p>JavaScript</p>
    <div class="bar"><div class="fill" style="width:70%"></div></div>

  </div>
</section>

<section class="hidden">
  <div class="card">
    <h2>Contact</h2>
    <p>Email: propeeel@gmail.com</p>
  </div>
</section>

<script>

// DARK MODE
function toggleMode(){
  document.body.classList.toggle("light");
}

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

</script>

</body>
</html>
