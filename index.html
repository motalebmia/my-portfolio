<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio X</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #0f2027;
  --text: #fff;
  --accent: linear-gradient(45deg,#00f7ff,#8a2be2);
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

/* NEW BUTTON */
.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 50px;
  background: var(--accent);
  color: white;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f7ff;
}

/* ripple */
.btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  opacity: 0;
}

.btn:active::after {
  width: 200px;
  height: 200px;
  opacity: 1;
  transition: 0.5s;
}

/* SECTION */
section {
  padding: 80px 20px;
  text-align: center;
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(50px);}
  to {opacity:1; transform:translateY(0);}
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  margin: 20px auto;
  width: 80%;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* TYPING */
.typing {
  color: #00f7ff;
  margin: 10px;
}

/* SKILL CIRCLE */
.skill {
  display: inline-block;
  margin: 20px;
}

.circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: conic-gradient(#00f7ff 0%, #222 0%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #111;
  padding: 15px 25px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(50px);
  transition: 0.5s;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<nav>
  <h2>Portfolio</h2>
  <button class="btn" onclick="toggleMode()">Mode</button>
</nav>

<section>
  <h1>Hi, I'm Md Motaleb Mia</h1>
  <div class="typing" id="typing"></div>
  <button class="btn" onclick="showToast()">Hire Me 🚀</button>
</section>

<section>
  <div class="card">
    <h2>About Me</h2>
    <p>I create premium websites & digital experiences.</p>
  </div>
</section>

<section>
  <div class="card">
    <h2>Skills</h2>

    <div class="skill">
      <div class="circle" data-percent="85">75%</div>
      <p>Editing</p>
    </div>

    <div class="skill">
      <div class="circle" data-percent="75">49%</div>
      <p>Marketing</p>
    </div>

  </div>
</section>

<section>
  <div class="card">
    <h2>Contact</h2>
    <button class="btn" onclick="showToast()">Contact Me</button>
  </div>
</section>

<div class="toast" id="toast">Message Sent Successfully ✔</div>

<script>

// TYPING
const texts = ["Creative Developer","Video Editor","Digital Marketer"];
let i=0,j=0,cur="",del=false;

function type(){
  cur = texts[i];
  if(!del){
    document.getElementById("typing").innerHTML = cur.substring(0,j++);
    if(j>cur.length){ del=true; setTimeout(type,1000); return;}
  } else {
    document.getElementById("typing").innerHTML = cur.substring(0,j--);
    if(j==0){ del=false; i=(i+1)%texts.length;}
  }
  setTimeout(type, del?50:100);
}
type();

// TOAST
function showToast(){
  let t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// SKILL ANIMATION
document.querySelectorAll('.circle').forEach(c=>{
  let percent = c.getAttribute('data-percent');
  let i=0;
  let interval = setInterval(()=>{
    i++;
    c.style.background = `conic-gradient(#00f7ff ${i}%, #222 ${i}%)`;
    if(i>=percent) clearInterval(interval);
  },20);
});

</script>

</body>
</html>
